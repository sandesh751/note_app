name: Deploy Code to Google Cloud Storage

on:
  push:
    branches:
      - main  # जब भी आप 'main' ब्रांच पर कोड पुश करेंगे, यह अपने आप चलेगा

# सुरक्षित टोकन (OIDC Token) जनरेट करने के लिए ये परमिशन ज़रूरी हैं
permissions:
  contents: read
  id-token: write

jobs:
  deploy-to-gcs:
    runs-on: ubuntu-latest

    steps:
    # 1. गिटहब मशीन पर आपका कोड डाउनलोड करना
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. बिना पासवर्ड के सीधे Google Cloud में लॉगिन करना
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    # 3. Google Cloud के टूल्स एक्टिवेट करना
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 4. पूरे कोड को बकेट में सिंक (Upload) करना
    - name: Sync Files to GCS Bucket
      run: |
        # यह कमांड आपके फ़ोल्डर की सभी फाइलों को बकेट में कॉपी कर देगी
        gcloud storage rsync . gs://${{ secrets.GCS_BUCKET_NAME }} --recursive --delete-unmatched
